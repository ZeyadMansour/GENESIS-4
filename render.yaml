# render.yaml — Deploys both services to Render (free tier)
services:
  # GENESIS-4 Main Backend
  - type: web
    name: genesis4-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PISTON_API_URL
        value: https://genesis4-piston.onrender.com
    plan: free

  # Piston Code Execution Engine
  - type: web
    name: genesis4-piston
    env: docker
    dockerfilePath: ./piston/Dockerfile
    plan: free
